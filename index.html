<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCreativo V9 | Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #F2F2F2; font-family: 'Outfit', sans-serif; }
        .glass { background: #0D0D0F; border: 1px solid rgba(212, 175, 55, 0.2); }
        .gold { color: #D4AF37; }
        .scan { position: absolute; width: 100%; height: 3px; background: #D4AF37; top: 0; animation: scan 2s infinite linear; display: none; z-index: 50; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="p-6">
    <nav class="flex justify-between items-center mb-12 border-b border-white/10 pb-6">
        <h1 class="text-xs font-bold tracking-[0.3em] uppercase">AutoCreativo <span class="gold italic">V9 Ultimate</span></h1>
        <button onclick="config()" class="text-[10px] border border-gold/40 px-4 py-2 rounded-full gold uppercase font-bold">🔑 Configurar Motor</button>
    </nav>

    <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-10">
        <div class="glass p-8 rounded-[2rem]">
            <div onclick="document.getElementById('file').click()" class="relative aspect-square border-2 border-dashed border-white/10 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-white/5 overflow-hidden">
                <input type="file" id="file" class="hidden" accept="image/*">
                <p id="idle" class="text-[10px] uppercase gold tracking-widest">Inyectar Obra</p>
                <img id="view" class="absolute inset-0 w-full h-full object-contain hidden p-4">
                <div id="line" class="scan"></div>
            </div>
            <button onclick="run()" class="w-full mt-6 bg-[#D4AF37] text-black py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Ejecutar Análisis</button>
        </div>

        <div id="res" class="space-y-6 opacity-20 transition-opacity duration-1000">
            <div class="glass p-8 rounded-3xl border-l-4 border-gold italic font-serif text-xl" id="p"></div>
            <div class="glass p-8 rounded-3xl text-sm text-gray-400 font-sans" id="t"></div>
        </div>
    </div>

    <script>
        function config() { const k = prompt("Pega tu API KEY nueva:"); if(k) localStorage.setItem('key_v9', k.trim()); }
        
        document.getElementById('file').onchange = e => {
            const r = new FileReader();
            r.onload = ev => {
                document.getElementById('view').src = ev.target.result;
                document.getElementById('view').classList.remove('hidden');
                document.getElementById('idle').classList.add('hidden');
                window.img = ev.target.result.split(',')[1];
            };
            r.readAsDataURL(e.target.files[0]);
        };

        async function run() {
            const k = localStorage.getItem('key_v9');
            if(!k || !window.img) return alert("Falta API Key o Imagen");
            document.getElementById('line').style.display = 'block';

            try {
                // PASO 1: AUTO-DETECCIÓN DE MODELO
                const list = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`);
                const dataModels = await list.json();
                
                // Buscamos el modelo flash más actual disponible para tu llave
                const model = dataModels.models.find(m => m.name.includes("flash") && m.supportedGenerationMethods.includes("generateContent"))?.name;
                
                if(!model) throw new Error("No se encontró un modelo compatible.");

                // PASO 2: EJECUCIÓN DINÁMICA
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${k}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [
                        { text: "Analiza esta imagen. Responde solo JSON: {\"p\":\"análisis poético\",\"t\":\"análisis técnico\"}" },
                        { inlineData: { mimeType: "image/jpeg", data: window.img } }
                    ]}] })
                });

                const data = await res.json();
                const clean = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const json = JSON.parse(clean);
                
                document.getElementById('p').innerText = json.p;
                document.getElementById('t').innerText = json.t;
                document.getElementById('res').style.opacity = "1";

            } catch (e) { 
                alert("Error de Motor: " + e.message + "\nVerifica que la API Key sea de un proyecto nuevo."); 
            } finally { 
                document.getElementById('line').style.display = 'none'; 
            }
        }
    </script>
</body>
</html>
