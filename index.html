<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCreativo V9 | Dualidad y Claridad</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#050505',
                        card: '#0D0D0F',
                        gold: '#D4AF37',
                        goldBright: '#FFD700',
                        accent: '#F2F2F2',
                        muted: '#A0A0A5'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #F2F2F2; font-family: 'Outfit', sans-serif; scroll-behavior: smooth; }
        .glass-card { background: #0D0D0F; border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 30px 60px -12px rgba(0,0,0,0.8); }
        .tab-btn { position: relative; transition: all 0.3s ease; }
        .tab-btn.active { color: #D4AF37; border-bottom: 2px solid #D4AF37; }
        .scanning-line { position: absolute; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #D4AF37, transparent); animation: scan 3s infinite ease-in-out; display: none; z-index: 30; }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .loader { border: 3px solid rgba(212, 175, 55, 0.1); border-top: 3px solid #D4AF37; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .art-glow { filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.3)); }
    </style>
</head>
<body class="antialiased min-h-screen">

    <nav class="fixed w-full z-50 bg-dark/95 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-7xl mx-auto px-8 h-24 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 border-2 border-gold flex items-center justify-center font-bold text-gold rotate-45">
                    <span class="-rotate-45">V9</span>
                </div>
                <span class="font-extrabold tracking-[0.3em] text-sm uppercase">AutoCreativo <span class="text-gold">Dual</span></span>
            </div>
        </div>
    </nav>

    <main class="pt-44 pb-32 px-8 max-w-7xl mx-auto">
        <header class="mb-24 text-center">
            <h1 class="text-6xl lg:text-8xl font-bold tracking-tighter mb-8 leading-none">
                El Alma en el <span class="text-gold font-serif italic">Trazo.</span>
            </h1>
            <p class="text-muted text-xl max-w-3xl mx-auto font-light">Análisis dual: precisión clínica + profundidad metafísica</p>
        </header>

        <div class="grid lg:grid-cols-12 gap-16">
            <!-- Panel Izquierdo -->
            <div class="lg:col-span-5">
                <div class="glass-card rounded-[2.5rem] p-10 sticky top-36">
                    <div id="drop-zone" class="w-full aspect-square rounded-3xl border-2 border-dashed border-white/20 bg-white/[0.02] flex flex-col items-center justify-center cursor-pointer relative overflow-hidden hover:border-gold/50 transition-all">
                        <input type="file" id="file-upload" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-50">
                        <div id="drop-content" class="text-center">
                            <div class="w-16 h-16 bg-gold/10 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">✨</div>
                            <p class="font-mono text-gold tracking-widest text-sm">ARRASTRA O SELECCIONA IMAGEN</p>
                        </div>
                        <img id="image-preview" class="absolute inset-0 w-full h-full object-contain hidden p-6">
                        <div id="scanner" class="scanning-line"></div>
                    </div>

                    <button id="btn-analyze" onclick="startAnalysis()" class="w-full mt-10 bg-gold hover:bg-goldBright text-dark py-6 rounded-2xl font-black uppercase tracking-widest text-sm transition-all flex items-center justify-center gap-3">
                        <span id="btn-text">EJECUTAR ANÁLISIS DUAL</span>
                        <div id="btn-loader" class="loader hidden"></div>
                    </button>

                    <!-- Mentor -->
                    <div id="mentor-section" class="mt-12 pt-10 border-t border-white/10 hidden">
                        <h3 class="font-mono text-gold text-xs tracking-widest mb-4">MENTOR CREATIVO</h3>
                        <div id="chat-history" class="space-y-4 max-h-80 overflow-y-auto text-sm mb-4"></div>
                        <div class="flex gap-2">
                            <input id="chat-input" type="text" placeholder="Pregúntale al mentor..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm focus:border-gold outline-none">
                            <button onclick="askAnalyst()" class="bg-gold text-dark px-6 rounded-xl font-bold">➤</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Resultados -->
            <div class="lg:col-span-7 space-y-24" id="diagnostico">
                <div id="results-empty" class="min-h-[500px] flex flex-col items-center justify-center opacity-40">
                    <p class="text-6xl mb-6">👁️</p>
                    <p class="font-mono uppercase text-sm tracking-widest">Sube un dibujo para comenzar</p>
                </div>

                <div id="results-dashboard" class="hidden space-y-28">
                    <!-- Bloque 1 -->
                    <section>
                        <h2 class="text-5xl font-bold mb-8 flex items-center gap-4"><span class="text-gold font-serif">01</span> Dinámica del Gesto</h2>
                        <div class="glass-card rounded-3xl overflow-hidden">
                            <div class="flex border-b border-white/10">
                                <button onclick="switchTab('gesto','simple')" id="gesto-simple-tab" class="tab-btn active px-8 py-4">Metafísico</button>
                                <button onclick="switchTab('gesto','clinico')" id="gesto-clinico-tab" class="tab-btn px-8 py-4">Clínico</button>
                            </div>
                            <div class="p-10">
                                <div id="gesto-simple-content"><p id="res-gesto-simple" class="text-reading text-reading-meta"></p></div>
                                <div id="gesto-clinico-content" class="hidden"><p id="res-gesto-clinico" class="text-reading"></p></div>
                            </div>
                        </div>
                    </section>

                    <!-- Bloque 2 -->
                    <section>
                        <h2 class="text-5xl font-bold mb-8 flex items-center gap-4"><span class="text-gold font-serif">02</span> Arquitectura de Símbolos</h2>
                        <div class="glass-card rounded-3xl overflow-hidden">
                            <div class="flex border-b border-white/10">
                                <button onclick="switchTab('simbolo','simple')" id="simbolo-simple-tab" class="tab-btn active px-8 py-4">Metafísico</button>
                                <button onclick="switchTab('simbolo','clinico')" id="simbolo-clinico-tab" class="tab-btn px-8 py-4">Clínico</button>
                            </div>
                            <div class="p-10">
                                <div id="simbolo-simple-content">
                                    <p id="res-simbolo-simple" class="text-reading text-reading-meta"></p>
                                    <div id="res-tags" class="flex flex-wrap gap-2 mt-6"></div>
                                </div>
                                <div id="simbolo-clinico-content" class="hidden"><p id="res-simbolo-clinico" class="text-reading"></p></div>
                            </div>
                        </div>
                    </section>

                    <!-- Bloque 3 -->
                    <section id="sintesis">
                        <h2 class="text-5xl font-bold mb-8 flex items-center gap-4"><span class="text-gold font-serif">03</span> Potencial Soñado</h2>
                        <div class="glass-card rounded-3xl p-12 text-center">
                            <div id="vision-container" class="max-w-2xl mx-auto aspect-square bg-black rounded-2xl overflow-hidden border border-gold/20 relative">
                                <img id="vision-image" class="hidden w-full h-full object-cover">
                                <div id="vision-loader" class="hidden loader absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
                                <div id="vision-placeholder" class="text-muted">La obra maestra aparecerá aquí</div>
                            </div>
                            <p id="res-consejo" class="text-xl text-gold font-serif italic my-10 min-h-[60px]"></p>
                            <button onclick="generateVision()" class="bg-white text-black font-black px-10 py-4 rounded-2xl hover:bg-gold transition-all">GENERAR OBRA DE ARTE</button>
                            <button id="btn-download" onclick="downloadImage()" class="hidden mt-4 text-white border border-white/30 px-10 py-4 rounded-2xl">Descargar PNG</button>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = "AIzaSyD5BBfs8D6EWUtNC2Tx0rrlIGB5JhoDzyw";
        let currentBase64 = null;
        let analysisData = null;

        const ui = {
            dropZone: document.getElementById('drop-zone'),
            preview: document.getElementById('image-preview'),
            scanner: document.getElementById('scanner'),
            dashboard: document.getElementById('results-dashboard'),
            empty: document.getElementById('results-empty'),
            mentor: document.getElementById('mentor-section'),
            visionImg: document.getElementById('vision-image'),
            visionLoader: document.getElementById('vision-loader'),
            btnDownload: document.getElementById('btn-download')
        };

        // Drag & Drop
        function processFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                ui.preview.src = e.target.result;
                ui.preview.classList.remove('hidden');
                document.getElementById('drop-content').classList.add('hidden');
                currentBase64 = e.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }

        ui.dropZone.addEventListener('drop', e => processFile(e.dataTransfer.files[0]));
        document.getElementById('file-upload').addEventListener('change', e => processFile(e.target.files[0]));

        function switchTab(section, mode) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${section}-simple-content`).classList.add('hidden');
            document.getElementById(`${section}-clinico-content`).classList.add('hidden');
            document.getElementById(`${section}-${mode}-tab`).classList.add('active');
            document.getElementById(`${section}-${mode}-content`).classList.remove('hidden');
        }

        async function startAnalysis() {
            if (!currentBase64) return alert("Primero sube una imagen");

            document.getElementById('btn-text').innerText = "ANALIZANDO...";
            document.getElementById('btn-analyze').disabled = true;
            ui.scanner.style.display = 'block';

            const prompt = `Analiza este dibujo creativo bajo una perspectiva dual:
1. Bloque Esencial/Metafísico: Explica simbolismo, energía y alma del trazo de forma poética y profunda.
2. Bloque Estructural/Clínico: Analiza motricidad, presión, composición y aspectos técnicos.
Responde SOLO con JSON válido:
{"gesto": {"simple": "...", "clinico": "..."}, "simbolo": {"simple": "...", "clinico": "..."}, "consejo": "...", "tags": ["tag1", "tag2"]}`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: currentBase64 }}]}],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await res.json();
                analysisData = JSON.parse(data.candidates[0].content.parts[0].text);
                renderResults();
            } catch (err) {
                alert("Error al analizar. Inténtalo de nuevo.");
                console.error(err);
            } finally {
                document.getElementById('btn-text').innerText = "EJECUTAR ANÁLISIS DUAL";
                document.getElementById('btn-analyze').disabled = false;
                ui.scanner.style.display = 'none';
            }
        }

        function renderResults() {
            ui.empty.classList.add('hidden');
            ui.dashboard.classList.remove('hidden');
            ui.mentor.classList.remove('hidden');

            document.getElementById('res-gesto-simple').innerText = analysisData.gesto?.simple || "";
            document.getElementById('res-gesto-clinico').innerText = analysisData.gesto?.clinico || "";
            document.getElementById('res-simbolo-simple').innerText = analysisData.simbolo?.simple || "";
            document.getElementById('res-simbolo-clinico').innerText = analysisData.simbolo?.clinico || "";
            document.getElementById('res-consejo').innerText = analysisData.consejo || "";

            const tagsDiv = document.getElementById('res-tags');
            tagsDiv.innerHTML = '';
            (analysisData.tags || []).forEach(tag => {
                const el = document.createElement('span');
                el.className = "px-4 py-1.5 bg-gold/10 border border-gold/30 text-gold text-xs rounded-full";
                el.textContent = tag;
                tagsDiv.appendChild(el);
            });
        }

        async function askAnalyst() {
            const input = document.getElementById('chat-input');
            if (!input.value || !currentBase64) return;

            const history = document.getElementById('chat-history');
            history.innerHTML += `<div class="text-right"><div class="inline-block bg-gold/10 px-4 py-3 rounded-2xl">${input.value}</div></div>`;
            const question = input.value;
            input.value = '';

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Responde como mentor creativo sabio y directo:" + question }, { inlineData: { mimeType: "image/jpeg", data: currentBase64 }}]}]
                    })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                history.innerHTML += `<div class="text-left"><div class="inline-block bg-white/5 px-4 py-3 rounded-2xl">${reply}</div></div>`;
                history.scrollTop = history.scrollHeight;
            } catch (e) { console.error(e); }
        }

        async function generateVision() {
            if (!currentBase64) return;
            ui.visionLoader.classList.remove('hidden');
            ui.visionImg.classList.add('hidden');

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Convierte este boceto en una hermosa obra de arte digital de galería, estilo oil painting con luz dorada, colores vibrantes y elegantes." }, { inlineData: { mimeType: "image/jpeg", data: currentBase64 }}]}]
                    })
                });
                const data = await res.json();
                const b64 = data.candidates[0].content.parts.find(p => p.inlineData).inlineData.data;
                ui.visionImg.src = `data:image/png;base64,${b64}`;
                ui.visionImg.classList.remove('hidden');
                ui.btnDownload.classList.remove('hidden');
            } catch (e) {
                alert("Error generando la imagen");
            } finally {
                ui.visionLoader.classList.add('hidden');
            }
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.href = ui.visionImg.src;
            link.download = 'AutoCreativo-V9-Masterpiece.png';
            link.click();
        }
    </script>
</body>
</html>
