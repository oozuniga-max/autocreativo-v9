<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCreativo V9 | Edición Privada</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#050505',
                        card: '#0D0D0F',
                        gold: '#D4AF37',
                        goldBright: '#FFD700',
                        accent: '#F2F2F2',
                        muted: '#A0A0A5'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #F2F2F2; font-family: 'Outfit', sans-serif; }
        .glass-card { background: #0D0D0F; border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 30px 60px -12px rgba(0,0,0,0.9); }
        .tab-btn.active { color: #D4AF37; border-bottom: 2px solid #D4AF37; opacity: 1; }
        .scanning-line { position: absolute; width: 100%; height: 3px; background: #D4AF37; top: 0; animation: scan 3s infinite ease-in-out; display: none; z-index: 30; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .loader { border: 3px solid rgba(212, 175, 55, 0.1); border-top: 3px solid #D4AF37; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased min-h-screen pb-20">

    <nav class="p-8 flex justify-between items-center border-b border-white/5 bg-dark/50 backdrop-blur-md sticky top-0 z-50">
        <div class="font-bold tracking-tighter text-xl text-gold">AUTOCREATIVO V9</div>
        <div class="text-[10px] font-mono text-muted uppercase tracking-[0.3em]">Estado: Privado & Seguro</div>
    </nav>

    <main class="max-w-6xl mx-auto mt-20 px-6">
        <div class="grid lg:grid-cols-2 gap-12">
            
            <!-- PANEL DE ENTRADA -->
            <div class="space-y-8">
                <div class="glass-card p-8 rounded-[2rem]">
                    <h2 class="font-serif italic text-2xl mb-6">Inyectar Visión</h2>
                    <div id="drop-zone" class="relative aspect-video rounded-2xl border-2 border-dashed border-white/10 flex flex-col items-center justify-center bg-white/[0.01] transition-all hover:bg-white/[0.03]">
                        <input type="file" id="file-upload" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                        <div id="placeholder-text" class="text-center">
                            <span class="text-4xl mb-2 block">🌌</span>
                            <p class="text-[10px] font-mono uppercase tracking-widest text-muted">Arrastra tu obra aquí</p>
                        </div>
                        <img id="preview" class="hidden absolute inset-0 w-full h-full object-contain p-4">
                        <div id="scanner" class="scanning-line"></div>
                    </div>
                    
                    <button onclick="startAnalysis()" id="btn-analyze" class="w-full mt-8 bg-gold text-dark py-4 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-goldBright transition-all flex items-center justify-center gap-3">
                        <span>Iniciar Análisis Dual</span>
                        <div id="loader" class="loader hidden"></div>
                    </button>
                </div>

                <div id="api-status" class="p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-[10px] font-mono hidden">
                    ERROR: No se detecta API KEY. Edita el archivo index.html línea 110.
                </div>
            </div>

            <!-- PANEL DE RESULTADOS -->
            <div id="results" class="space-y-8 hidden">
                <div class="glass-card rounded-[2rem] overflow-hidden">
                    <div class="flex border-b border-white/5 bg-white/[0.02]">
                        <button onclick="setTab('meta')" id="tab-meta" class="tab-btn active flex-1 py-4 font-mono text-[10px] tracking-widest uppercase">Metafísico</button>
                        <button onclick="setTab('tec')" id="tab-tec" class="tab-btn flex-1 py-4 font-mono text-[10px] tracking-widest uppercase">Técnico</button>
                    </div>
                    <div class="p-8">
                        <div id="content-meta" class="leading-relaxed text-accent italic font-serif text-lg"></div>
                        <div id="content-tec" class="leading-relaxed text-muted hidden text-sm font-sans"></div>
                    </div>
                </div>
                
                <div class="glass-card p-8 rounded-[2rem] text-center">
                    <p id="quote" class="text-gold font-serif italic mb-6"></p>
                    <div class="flex flex-wrap gap-2 justify-center" id="tags"></div>
                </div>
            </div>

            <!-- ESTADO VACÍO -->
            <div id="empty-state" class="flex flex-col items-center justify-center opacity-20 py-20">
                <div class="w-16 h-16 border border-gold/30 rounded-full animate-pulse mb-4"></div>
                <p class="font-mono text-[10px] uppercase tracking-widest">Esperando señal visual...</p>
            </div>

        </div>
    </main>

    <script>
        // --- INSTRUCCIONES: PEGA TU CLAVE AQUÍ ---
        const apiKey = ""; 
        // ---------------------------------------

        let currentImage = null;

        const fileInput = document.getElementById('file-upload');
        const preview = document.getElementById('preview');
        const scanner = document.getElementById('scanner');
        const loader = document.getElementById('loader');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    preview.src = ev.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('placeholder-text').classList.add('hidden');
                    currentImage = ev.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            }
        });

        async function startAnalysis() {
            if(!currentImage) return alert("Por favor, selecciona una imagen.");
            if(!apiKey) { document.getElementById('api-status').classList.remove('hidden'); return; }

            loader.classList.remove('hidden');
            scanner.style.display = 'block';
            document.getElementById('btn-analyze').disabled = true;

            const prompt = `Analiza esta obra. Responde solo en JSON: 
            {"meta": "Análisis poético y espiritual (200 palabras)", 
             "tec": "Análisis técnico de trazo y composición (200 palabras)", 
             "quote": "Frase inspiradora corta", 
             "tags": ["Tag1", "Tag2"]}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                {text: prompt},
                                {inlineData: {mimeType: "image/jpeg", data: currentImage}}
                            ]
                        }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                
                showResults(result);
            } catch (err) {
                alert("Error de conexión. Revisa tu API Key.");
                console.error(err);
            } finally {
                loader.classList.add('hidden');
                scanner.style.display = 'none';
                document.getElementById('btn-analyze').disabled = false;
            }
        }

        function showResults(data) {
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            
            document.getElementById('content-meta').innerText = data.meta;
            document.getElementById('content-tec').innerText = data.tec;
            document.getElementById('quote').innerText = data.quote;
            
            const tagsDiv = document.getElementById('tags');
            tagsDiv.innerHTML = '';
            data.tags.forEach(t => {
                tagsDiv.innerHTML += `<span class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[9px] font-mono text-gold uppercase">${t}</span>`;
            });
        }

        function setTab(type) {
            const isMeta = type === 'meta';
            document.getElementById('tab-meta').classList.toggle('active', isMeta);
            document.getElementById('tab-tec').classList.toggle('active', !isMeta);
            document.getElementById('content-meta').classList.toggle('hidden', !isMeta);
            document.getElementById('content-tec').classList.toggle('hidden', isMeta);
        }
    </script>
</body>
</html>
