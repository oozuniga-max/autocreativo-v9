<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCreativo V9 | Atelier de Autor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #F2F2F2; font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(13, 13, 15, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.15); }
        .gold-text { color: #D4AF37; }
        .scan-line { position: absolute; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, #D4AF37, transparent); top: 0; animation: scan 3s infinite linear; display: none; z-index: 50; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .loader { border: 2px solid rgba(212, 175, 55, 0.1); border-top: 2px solid #D4AF37; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased min-h-screen">

    <nav class="fixed w-full z-50 bg-black/90 border-b border-white/5 h-20 flex items-center px-8 justify-between">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 border-2 border-gold flex items-center justify-center font-bold text-gold rotate-45"><span class="-rotate-45 text-[10px]">V9</span></div>
            <span class="font-extrabold tracking-[0.3em] text-[11px] uppercase">AutoCreativo <span class="gold-text italic">Dual Pro</span></span>
        </div>
        <button onclick="configurarMotor()" class="text-[9px] border border-gold/40 px-4 py-2 rounded-full gold-text hover:bg-gold hover:text-black transition-all font-bold">
            🔑 CONFIGURAR MOTOR
        </button>
    </nav>

    <main class="pt-32 pb-20 px-6 max-w-6xl mx-auto">
        <div class="grid lg:grid-cols-2 gap-12">
            <div class="glass rounded-[2.5rem] p-8">
                <div id="drop-zone" onclick="document.getElementById('file-input').click()" class="aspect-square rounded-3xl border-2 border-dashed border-white/10 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group hover:border-gold/30">
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                    <div id="idle-view" class="text-center"><p class="text-4xl mb-4">🎨</p><p class="text-[9px] uppercase gold-text tracking-widest">Inyectar Obra</p></div>
                    <img id="preview" class="absolute inset-0 w-full h-full object-contain hidden z-10 p-4">
                    <div id="scanner" class="scan-line"></div>
                </div>
                <button onclick="analizar()" class="w-full mt-8 bg-[#D4AF37] text-black py-4 rounded-xl font-black uppercase text-[10px] tracking-[0.3em] flex items-center justify-center gap-3">
                    <span id="btn-text">Ejecutar Análisis Dual</span>
                    <div id="loader" class="loader"></div>
                </button>
            </div>

            <div id="results-area" class="space-y-8 opacity-20 transition-opacity duration-1000">
                <div class="glass p-8 rounded-[2rem] border-l-4 border-gold">
                    <h3 class="gold-text text-[10px] font-bold uppercase tracking-widest mb-4">01 Esencia Poética</h3>
                    <p id="res-p" class="text-xl italic font-serif leading-relaxed text-gray-100">Esperando sintonía...</p>
                </div>
                <div class="glass p-8 rounded-[2rem]">
                    <h3 class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-4">02 Estructura Técnica</h3>
                    <p id="res-t" class="text-sm leading-relaxed text-gray-400">Análisis pendiente.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let imgB64 = null;

        function configurarMotor() {
            const k = prompt("Pega tu API KEY nueva:");
            if(k) { localStorage.setItem('v9_key', k.trim()); alert("Motor configurado."); }
        }

        document.getElementById('file-input').onchange = e => {
            const r = new FileReader();
            r.onload = ev => {
                document.getElementById('preview').src = ev.target.result;
                document.getElementById('preview').classList.remove('hidden');
                document.getElementById('idle-view').classList.add('hidden');
                imgB64 = ev.target.result.split(',')[1];
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        async function analizar() {
            const key = localStorage.getItem('v9_key');
            if(!key || !imgB64) return alert("Configura la llave y sube una imagen.");

            const scanner = document.getElementById('scanner');
            const loader = document.getElementById('loader');
            scanner.style.display = 'block';
            loader.style.display = 'block';

            // INTENTO MULTI-MODELO (Si uno falla, prueba el otro)
            const endpoints = [
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`,
                `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`
            ];

            let exitoso = false;
            for (let url of endpoints) {
                if (exitoso) break;
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [
                                { text: "Analiza esta imagen. Responde solo JSON: {\"p\": \"analisis poetico\", \"t\": \"analisis tecnico\"}" },
                                { inlineData: { mimeType: "image/jpeg", data: imgB64 } }
                            ]}]
                        })
                    });
                    const data = await response.json();
                    if(data.error) continue;

                    const res = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim());
                    document.getElementById('res-p').innerText = res.p;
                    document.getElementById('res-t').innerText = res.t;
                    document.getElementById('results-area').style.opacity = "1";
                    exitoso = true;
                } catch (e) { console.warn("Reintentando con otro endpoint..."); }
            }

            if(!exitoso) alert("Error: La clave no es válida o la API no está activa. Asegúrate de crear una clave NUEVA.");
            scanner.style.display = 'none';
            loader.style.display = 'none';
        }
    </script>
</body>
</html>
