<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCreativo V9 | Edición Pública</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#050505',
                        card: '#0D0D0F',
                        gold: '#D4AF37',
                        goldBright: '#FFD700',
                        accent: '#F2F2F2',
                        muted: '#A0A0A5'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #F2F2F2; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(13, 13, 15, 0.85); border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(25px); box-shadow: 0 40px 80px -15px rgba(0,0,0,0.9); transition: transform 0.3s ease; }
        .tab-btn { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0.3; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #D4AF37; border-bottom: 2px solid #D4AF37; opacity: 1; }
        .scanning-line { position: absolute; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #D4AF37, transparent); top: 0; animation: scan 3s infinite linear; display: none; z-index: 30; filter: drop-shadow(0 0 8px #D4AF37); }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .loader { border: 2px solid rgba(212, 175, 55, 0.1); border-top: 2px solid #D4AF37; border-radius: 50%; width: 22px; height: 22px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glow-text { text-shadow: 0 0 25px rgba(212, 175, 55, 0.5); }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased min-h-screen pb-20">

    <!-- MODAL DE API KEY -->
    <div id="api-modal" class="fixed inset-0 z-[100] bg-black/98 backdrop-blur-3xl flex items-center justify-center p-6 hidden">
        <div class="glass-card p-12 rounded-[3rem] max-w-md w-full border-gold/40">
            <div class="w-16 h-16 bg-gold/10 rounded-full flex items-center justify-center mb-8 mx-auto border border-gold/20 shadow-inner">
                <span class="text-3xl text-gold">🔑</span>
            </div>
            <h3 class="text-gold font-serif italic text-3xl mb-2 text-center">Conexión Neural</h3>
            <p class="text-muted text-[10px] mb-8 font-mono uppercase tracking-[0.4em] text-center">Protocolo de Acceso Gemini 2.5</p>
            
            <div class="space-y-4">
                <input type="password" id="api-key-input" placeholder="Ingresa tu Clave AIzaSy..." 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-sm font-mono text-gold focus:border-gold/50 focus:ring-0 transition-all placeholder:text-muted/20">
                
                <button onclick="saveApiKey()" class="w-full bg-gold text-dark font-black py-5 rounded-2xl text-[12px] uppercase tracking-[0.25em] hover:bg-goldBright transition-all shadow-[0_15px_40px_rgba(212,175,55,0.3)] transform active:scale-95">
                    Establecer Vínculo
                </button>
                <button onclick="toggleApiModal(false)" class="w-full py-4 text-[10px] text-muted hover:text-white uppercase tracking-widest transition-colors font-mono">
                    Continuar sin Clave
                </button>
            </div>
        </div>
    </div>

    <!-- NAVEGACIÓN -->
    <nav class="p-8 flex justify-between items-center border-b border-white/5 bg-dark/80 backdrop-blur-3xl sticky top-0 z-50">
        <div class="flex items-center gap-5">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-gold/30 to-transparent border border-gold/40 flex items-center justify-center text-gold font-bold shadow-2xl">A</div>
            <div>
                <div class="font-bold tracking-[0.3em] text-md text-gold glow-text leading-none mb-2">AUTOCREATIVO</div>
                <div class="text-[9px] font-mono text-muted tracking-[0.4em]">SISTEMA DE PSICOGRAFÍA DIGITAL</div>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <div id="api-indicator" class="flex items-center gap-3 px-5 py-2.5 rounded-full border text-[10px] font-mono tracking-widest transition-all"></div>
            <button onclick="toggleApiModal(true)" class="text-muted hover:text-gold transition-all transform hover:rotate-180 duration-700">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto mt-20 px-8">
        <div class="grid lg:grid-cols-2 gap-20 items-start">
            
            <!-- PANEL DE ENTRADA -->
            <div class="space-y-10 animate-fade-in">
                <div class="glass-card p-12 rounded-[3.5rem] relative overflow-hidden group">
                    <div class="absolute -top-12 -right-12 p-16 opacity-[0.05] font-serif italic text-9xl pointer-events-none group-hover:opacity-[0.1] transition-opacity duration-700">Vision</div>
                    
                    <h2 class="font-serif italic text-4xl mb-10 text-accent">Inyectar Obra</h2>
                    
                    <div class="relative aspect-video rounded-[3rem] border-2 border-dashed border-white/10 flex flex-col items-center justify-center bg-white/[0.02] overflow-hidden group transition-all hover:border-gold/40 hover:bg-white/[0.04]">
                        <input type="file" id="file-upload" class="absolute inset-0 opacity-0 cursor-pointer z-20" accept="image/*">
                        
                        <div id="placeholder-text" class="text-center group-hover:scale-105 transition-transform duration-700">
                            <div class="w-28 h-28 bg-gold/5 rounded-full flex items-center justify-center mb-8 mx-auto border border-gold/10 group-hover:border-gold/30 group-hover:shadow-[0_0_50px_rgba(212,175,55,0.2)] transition-all">
                                <span class="text-5xl">🌌</span>
                            </div>
                            <p class="text-[11px] font-mono uppercase tracking-[0.5em] text-muted">Revelar Arquetipo</p>
                        </div>

                        <img id="preview" class="hidden absolute inset-0 w-full h-full object-contain p-10 z-10 animate-fade-in">
                        <div id="scanner" class="scanning-line"></div>
                    </div>
                    
                    <button onclick="startAnalysis()" id="btn-analyze" class="w-full mt-12 bg-gold text-dark py-6 rounded-2xl font-black uppercase text-[13px] tracking-[0.35em] hover:bg-goldBright transition-all flex items-center justify-center gap-5 shadow-[0_25px_50px_-12px_rgba(212,175,55,0.25)] disabled:opacity-50">
                        <span id="btn-text">INICIAR TRANSMUTACIÓN</span>
                        <div id="loader" class="loader hidden"></div>
                    </button>
                </div>
            </div>

            <!-- PANEL DE RESULTADOS -->
            <div class="relative">
                <div id="results" class="space-y-10 hidden animate-fade-in" style="animation-delay: 0.3s">
                    <div class="glass-card rounded-[4rem] overflow-hidden border-gold/10">
                        <div class="flex border-b border-white/5 bg-white/[0.05]">
                            <button onclick="setTab('meta')" id="tab-meta" class="tab-btn active flex-1 py-7 font-mono text-[11px] tracking-[0.5em] uppercase">Metafísico</button>
                            <button onclick="setTab('tec')" id="tab-tec" class="tab-btn flex-1 py-7 font-mono text-[11px] tracking-[0.5em] uppercase">Técnico</button>
                        </div>
                        <div class="p-14">
                            <div id="content-meta" class="leading-relaxed text-accent italic font-serif text-2xl first-letter:text-6xl first-letter:text-gold first-letter:font-bold first-letter:mr-3"></div>
                            <div id="content-tec" class="leading-relaxed text-muted hidden text-md font-sans tracking-wide space-y-6"></div>
                        </div>
                    </div>
                    
                    <div class="glass-card p-14 rounded-[4rem] text-center bg-gradient-to-br from-card via-dark to-black border-gold/20 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-transparent via-gold/40 to-transparent"></div>
                        <div class="text-gold/15 text-7xl font-serif mb-0 leading-none">“</div>
                        <p id="quote" class="text-gold font-serif italic mb-12 text-3xl leading-relaxed px-10 relative z-10"></p>
                        <div class="flex flex-wrap gap-4 justify-center" id="tags"></div>
                    </div>
                </div>

                <!-- ESTADO VACÍO -->
                <div id="empty-state" class="flex flex-col items-center justify-center py-48 lg:h-[700px] border border-white/10 rounded-[5rem] bg-white/[0.01] animate-fade-in">
                    <div class="w-40 h-40 border border-gold/10 rounded-full animate-pulse flex items-center justify-center mb-10 bg-gold/[0.02]">
                        <div class="w-24 h-24 border border-gold/20 rounded-full flex items-center justify-center text-gold/30 text-5xl shadow-2xl">👁️</div>
                    </div>
                    <p class="font-mono text-[11px] uppercase tracking-[0.8em] text-muted/40">Frecuencia de Análisis Pasiva</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let apiKey = localStorage.getItem('gemini_api_key') || "";

        function updateIndicator() {
            const ind = document.getElementById('api-indicator');
            if(apiKey) {
                ind.innerHTML = `<span class="w-2.5 h-2.5 rounded-full bg-gold shadow-[0_0_15px_rgba(212,175,55,1)] mr-3"></span> <span class="text-gold">SISTEMA ONLINE</span>`;
                ind.className = "flex items-center px-6 py-3 rounded-full border border-gold/40 bg-gold/10 text-[10px] font-mono tracking-[0.25em]";
            } else {
                ind.innerHTML = `<span class="w-2.5 h-2.5 rounded-full bg-red-600 animate-pulse mr-3"></span> <span class="text-red-500">SIN VÍNCULO</span>`;
                ind.className = "flex items-center px-6 py-3 rounded-full border border-red-500/30 bg-red-500/10 text-[10px] font-mono tracking-[0.25em]";
            }
        }

        function toggleApiModal(show) {
            document.getElementById('api-modal').classList.toggle('hidden', !show);
            if(show) {
                const input = document.getElementById('api-key-input');
                input.value = apiKey;
                setTimeout(() => input.focus(), 400);
            }
        }

        function saveApiKey() {
            const val = document.getElementById('api-key-input').value.trim();
            if(val) {
                apiKey = val;
                localStorage.setItem('gemini_api_key', val);
                updateIndicator();
                toggleApiModal(false);
            }
        }

        updateIndicator();
        if(!apiKey) setTimeout(() => toggleApiModal(true), 2500);

        let currentImage = null;
        const fileInput = document.getElementById('file-upload');
        const preview = document.getElementById('preview');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    preview.src = ev.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('placeholder-text').classList.add('hidden');
                    currentImage = ev.target.result.split(',')[1];
                    document.getElementById('results').classList.add('hidden');
                    document.getElementById('empty-state').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        async function startAnalysis() {
            if(!currentImage) return;
            if(!apiKey) return toggleApiModal(true);

            const btn = document.getElementById('btn-analyze');
            const loader = document.getElementById('loader');
            const scanner = document.getElementById('scanner');
            const btnText = document.getElementById('btn-text');

            btn.disabled = true;
            btnText.innerText = "TRASMITIENDO V2.5...";
            loader.classList.remove('hidden');
            scanner.style.display = 'block';

            // Intentar primero con el modelo más nuevo (2.5) y fallback al 1.5 si falla
            const models = ["gemini-2.5-flash-preview-09-2025", "gemini-1.5-flash"];
            let success = false;

            for (const model of models) {
                if (success) break;
                
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                const prompt = `Analiza esta imagen como una obra de arte psicográfica. 
                Responde exclusivamente con un objeto JSON válido, sin bloques de código ni texto adicional.
                Estructura JSON: {"meta": "párrafo poético místico", "tec": "párrafo técnico artístico", "quote": "frase corta profética", "tags": ["tag1", "tag2", "tag3"]}`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    {text: prompt},
                                    {inlineData: {mimeType: "image/jpeg", data: currentImage}}
                                ]
                            }]
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const rawText = data.candidates[0].content.parts[0].text;
                        const jsonContent = rawText.substring(rawText.indexOf('{'), rawText.lastIndexOf('}') + 1);
                        const cleanJson = JSON.parse(jsonContent);
                        showResults(cleanJson);
                        success = true;
                    }
                } catch (err) {
                    console.warn(`Fallo con el modelo ${model}, reintentando...`);
                }
            }

            if (!success) {
                alert("⚠️ Error de conexión crítica. El canal neural está obstruido. Revisa tu clave de API.");
            }

            btn.disabled = false;
            btnText.innerText = "INICIAR TRANSMUTACIÓN";
            loader.classList.add('hidden');
            scanner.style.display = 'none';
        }

        function showResults(data) {
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('content-meta').innerText = data.meta;
            document.getElementById('content-tec').innerText = data.tec;
            document.getElementById('quote').innerText = data.quote;
            
            const tagsDiv = document.getElementById('tags');
            tagsDiv.innerHTML = '';
            data.tags.forEach(t => {
                tagsDiv.innerHTML += `<span class="px-6 py-2.5 bg-gold/5 border border-gold/25 rounded-full text-[10px] font-mono text-gold uppercase tracking-[0.3em] shadow-lg">${t}</span>`;
            });
            
            document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function setTab(type) {
            const isMeta = type === 'meta';
            document.getElementById('tab-meta').classList.toggle('active', isMeta);
            document.getElementById('tab-tec').classList.toggle('active', !isMeta);
            document.getElementById('content-meta').classList.toggle('hidden', !isMeta);
            document.getElementById('content-tec').classList.toggle('hidden', isMeta);
        }
    </script>
</body>
</html>
