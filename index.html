<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCreativo V9 | Edición Pública</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#050505',
                        card: '#0D0D0F',
                        gold: '#D4AF37',
                        goldBright: '#FFD700',
                        accent: '#F2F2F2',
                        muted: '#A0A0A5'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #F2F2F2; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .glass-card { background: #0D0D0F; border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 30px 60px -12px rgba(0,0,0,0.9); }
        .tab-btn { transition: all 0.3s ease; opacity: 0.5; }
        .tab-btn.active { color: #D4AF37; border-bottom: 2px solid #D4AF37; opacity: 1; }
        .scanning-line { position: absolute; width: 100%; height: 3px; background: #D4AF37; top: 0; animation: scan 3s infinite ease-in-out; display: none; z-index: 30; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .loader { border: 3px solid rgba(212, 175, 55, 0.1); border-top: 3px solid #D4AF37; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased min-h-screen pb-20">

    <!-- MODAL DE API KEY -->
    <div id="api-modal" class="fixed inset-0 z-[100] bg-dark/95 backdrop-blur-xl flex items-center justify-center p-6 hidden">
        <div class="glass-card p-8 rounded-[2rem] max-w-md w-full border-gold/40">
            <h3 class="text-gold font-serif italic text-2xl mb-2">Conexión Neural</h3>
            <p class="text-muted text-[10px] mb-6 font-mono uppercase tracking-widest">Introduce tu Gemini API Key</p>
            <input type="password" id="api-key-input" placeholder="AIzaSy..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 text-sm font-mono text-gold mb-4 focus:border-gold/50 transition-all">
            <button onclick="saveApiKey()" class="w-full bg-gold text-dark font-bold py-4 rounded-xl text-[10px] uppercase tracking-widest hover:bg-goldBright transition-all shadow-lg shadow-gold/10">Establecer Vínculo</button>
            <button onclick="toggleApiModal(false)" class="w-full mt-2 py-3 text-[9px] text-muted uppercase tracking-widest hover:text-white">Cerrar</button>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center border-b border-white/5 bg-dark/80 backdrop-blur-md sticky top-0 z-50">
        <div class="font-bold tracking-tighter text-xl text-gold">AUTOCREATIVO V9</div>
        <div class="flex items-center gap-4">
            <div id="api-indicator" class="hidden md:flex items-center gap-2 px-3 py-1 rounded-full border border-white/10 text-[9px] font-mono uppercase tracking-tighter"></div>
            <button onclick="toggleApiModal(true)" class="p-2 rounded-full hover:bg-white/5 transition-all text-muted hover:text-gold">⚙️</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-12 px-6">
        <div class="grid lg:grid-cols-2 gap-12">
            
            <div class="space-y-8">
                <div class="glass-card p-8 rounded-[2rem]">
                    <h2 class="font-serif italic text-2xl mb-6 text-accent">Inyectar Visión</h2>
                    <div class="relative aspect-video rounded-2xl border-2 border-dashed border-white/10 flex flex-col items-center justify-center bg-white/[0.01] overflow-hidden group">
                        <input type="file" id="file-upload" class="absolute inset-0 opacity-0 cursor-pointer z-20" accept="image/*">
                        <div id="placeholder-text" class="text-center group-hover:scale-110 transition-transform">
                            <span class="text-4xl mb-2 block">🖼️</span>
                            <p class="text-[10px] font-mono uppercase tracking-widest text-muted">Subir Archivo</p>
                        </div>
                        <img id="preview" class="hidden absolute inset-0 w-full h-full object-contain p-4 z-10">
                        <div id="scanner" class="scanning-line"></div>
                    </div>
                    
                    <button onclick="startAnalysis()" id="btn-analyze" class="w-full mt-8 bg-gold text-dark py-4 rounded-xl font-bold uppercase text-[10px] tracking-widest hover:bg-goldBright transition-all flex items-center justify-center gap-3">
                        <span id="btn-text">Iniciar Análisis</span>
                        <div id="loader" class="loader hidden"></div>
                    </button>
                </div>
            </div>

            <div id="results" class="space-y-6 hidden">
                <div class="glass-card rounded-[2rem] overflow-hidden">
                    <div class="flex border-b border-white/5 bg-white/[0.02]">
                        <button onclick="setTab('meta')" id="tab-meta" class="tab-btn active flex-1 py-4 font-mono text-[9px] tracking-widest uppercase">Metafísico</button>
                        <button onclick="setTab('tec')" id="tab-tec" class="tab-btn flex-1 py-4 font-mono text-[9px] tracking-widest uppercase">Técnico</button>
                    </div>
                    <div class="p-8">
                        <div id="content-meta" class="leading-relaxed text-accent italic font-serif text-lg animate-pulse-slow"></div>
                        <div id="content-tec" class="leading-relaxed text-muted hidden text-sm font-sans"></div>
                    </div>
                </div>
                
                <div class="glass-card p-8 rounded-[2rem] text-center bg-gradient-to-b from-card to-dark">
                    <p id="quote" class="text-gold font-serif italic mb-6 text-xl leading-snug"></p>
                    <div class="flex flex-wrap gap-2 justify-center" id="tags"></div>
                </div>
            </div>

            <div id="empty-state" class="flex flex-col items-center justify-center opacity-10 py-20 lg:h-full">
                <div class="w-20 h-20 border border-gold/30 rounded-full animate-pulse flex items-center justify-center text-gold">👁️</div>
                <p class="mt-4 font-mono text-[9px] uppercase tracking-[0.3em]">Sistema de Análisis Pasivo</p>
            </div>
        </div>
    </main>

    <script>
        let apiKey = localStorage.getItem('gemini_api_key') || "";

        function updateIndicator() {
            const ind = document.getElementById('api-indicator');
            ind.classList.remove('hidden');
            if(apiKey) {
                ind.innerHTML = `<span class="text-gold">● ONLINE</span>`;
                ind.classList.add('border-gold/20');
            } else {
                ind.innerHTML = `<span class="text-red-500">● OFFLINE</span>`;
            }
        }

        function toggleApiModal(show) {
            document.getElementById('api-modal').classList.toggle('hidden', !show);
        }

        function saveApiKey() {
            const val = document.getElementById('api-key-input').value.trim();
            if(val) {
                apiKey = val;
                localStorage.setItem('gemini_api_key', val);
                updateIndicator();
                toggleApiModal(false);
            }
        }

        updateIndicator();
        if(!apiKey) setTimeout(() => toggleApiModal(true), 1000);

        let currentImage = null;
        const fileInput = document.getElementById('file-upload');
        const preview = document.getElementById('preview');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    preview.src = ev.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('placeholder-text').classList.add('hidden');
                    currentImage = ev.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            }
        });

        async function startAnalysis() {
            if(!currentImage) return alert("Sube una imagen.");
            if(!apiKey) return toggleApiModal(true);

            const btn = document.getElementById('btn-analyze');
            const loader = document.getElementById('loader');
            const scanner = document.getElementById('scanner');

            btn.disabled = true;
            loader.classList.remove('hidden');
            scanner.style.display = 'block';

            // Usamos Gemini 1.5 Flash para mayor estabilidad de cuota
            const model = "gemini-1.5-flash"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

            const prompt = `Analiza esta obra artística. Proporciona un análisis profundo y técnico. Responde solo en JSON: 
            {"meta": "Análisis poético espiritual", "tec": "Análisis técnico de trazo y color", "quote": "Frase corta definitoria", "tags": ["Tag1", "Tag2"]}`;

            try {
                // Implementación de reintentos básicos (Exponential Backoff simple)
                let response;
                let retries = 3;
                while(retries > 0) {
                    response = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    {text: prompt},
                                    {inlineData: {mimeType: "image/jpeg", data: currentImage}}
                                ]
                            }]
                        })
                    });
                    if(response.ok) break;
                    retries--;
                    await new Promise(r => setTimeout(r, 2000));
                }

                if (!response.ok) {
                    const errorData = await response.json();
                    if(response.status === 400) throw new Error("API_KEY_INVALID");
                    if(response.status === 429) throw new Error("CUOTA_EXCEDIDA");
                    throw new Error("API_ERROR");
                }

                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                // Limpieza de posibles markdowns en la respuesta JSON
                const cleanJson = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                showResults(JSON.parse(cleanJson));
                
            } catch (err) {
                console.error(err);
                if(err.message === "API_KEY_INVALID") alert("La clave es incorrecta. Haz clic en ⚙️ para cambiarla.");
                else if(err.message === "CUOTA_EXCEDIDA") alert("Has alcanzado el límite gratuito de Google. Espera un minuto.");
                else alert("Error de conexión. Revisa que tu clave de Google AI Studio sea correcta.");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
                scanner.style.display = 'none';
            }
        }

        function showResults(data) {
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('content-meta').innerText = data.meta;
            document.getElementById('content-tec').innerText = data.tec;
            document.getElementById('quote').innerText = data.quote;
            const tagsDiv = document.getElementById('tags');
            tagsDiv.innerHTML = '';
            data.tags.forEach(t => {
                tagsDiv.innerHTML += `<span class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[9px] font-mono text-gold uppercase">${t}</span>`;
            });
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        function setTab(type) {
            const isMeta = type === 'meta';
            document.getElementById('tab-meta').classList.toggle('active', isMeta);
            document.getElementById('tab-tec').classList.toggle('active', !isMeta);
            document.getElementById('content-meta').classList.toggle('hidden', !isMeta);
            document.getElementById('content-tec').classList.toggle('hidden', isMeta);
        }
    </script>
</body>
</html>
