<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCreativo V9 | Atelier de Autor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&family=Playfair+Display:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
    <style>
        body { background: #030303; color: #E0E0E0; font-family: 'Outfit', sans-serif; line-height: 1.8; }
        .glass { background: rgba(10, 10, 12, 0.98); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 2rem; }
        .gold-glow { text-shadow: 0 0 15px rgba(212, 175, 55, 0.3); color: #D4AF37; }
        .tab-btn { transition: all 0.4s; opacity: 0.2; letter-spacing: 0.3em; border-bottom: 2px solid transparent; font-weight: 600; font-size: 9px; text-transform: uppercase; }
        .tab-btn.active { opacity: 1; color: #D4AF37; border-bottom: 2px solid #D4AF37; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #D4AF37; top: 0; animation: scan 3s infinite ease-in-out; display: none; z-index: 50; }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .serif-italic { font-family: 'Playfair Display', serif; font-style: italic; }
        .loader { border: 1px solid rgba(212, 175, 55, 0.1); border-top: 1px solid #D4AF37; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-box { opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
        .result-box.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="antialiased min-h-screen">

    <nav class="fixed w-full z-50 bg-black/95 backdrop-blur-xl border-b border-white/5 h-20 flex items-center px-12 justify-between">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 border border-gold/30 flex items-center justify-center font-bold text-gold rotate-45"><span class="-rotate-45 text-[8px] font-black uppercase">V9</span></div>
            <span class="font-bold tracking-[0.4em] text-[9px] uppercase">AutoCreativo <span class="gold-glow serif-italic lowercase">Atelier</span></span>
        </div>
        <div class="flex gap-10">
            <button onclick="nav('analisis')" id="nav-analisis" class="tab-btn active">Diagnóstico</button>
            <button onclick="nav('mentor')" id="nav-mentor" class="tab-btn">Mentoría</button>
            <button onclick="nav('vision')" id="nav-vision" class="tab-btn">Alquimia</button>
        </div>
        <button onclick="config()" class="text-[8px] border border-gold/20 px-5 py-1.5 rounded-full gold-glow hover:bg-gold hover:text-black transition-all font-black uppercase">Motor</button>
    </nav>

    <main class="pt-32 px-12 max-w-7xl mx-auto pb-20">
        
        <div id="sec-analisis" class="grid lg:grid-cols-2 gap-12 items-start transition-all duration-700">
            <div class="space-y-8">
                <div onclick="document.getElementById('file').click()" class="relative aspect-square glass flex items-center justify-center cursor-pointer hover:bg-white/[0.01] overflow-hidden group transition-all duration-500 shadow-2xl">
                    <input type="file" id="file" class="hidden" accept="image/*">
                    <div id="idle" class="text-center group-hover:scale-105 transition-all">
                        <span class="text-2xl block mb-4 opacity-10 text-gold">✧</span>
                        <p class="text-[8px] uppercase gold-glow tracking-[0.5em] font-light italic">Procesar Trazado</p>
                    </div>
                    <img id="preview" class="absolute inset-0 w-full h-full object-contain hidden z-10 p-10">
                    <div id="line" class="scan-line"></div>
                </div>
                <button onclick="run('analisis')" class="w-full bg-[#D4AF37] text-black py-5 rounded-2xl font-black uppercase text-[10px] tracking-[0.4em] flex items-center justify-center gap-4 active:scale-95 transition-all">
                    Sincronizar <div id="load-analisis" class="loader !border-black/20 !border-top-black"></div>
                </button>
            </div>

            <div id="out-analisis" class="space-y-8">
                <div class="glass p-10 result-box" id="box-s">
                    <h3 class="text-[8px] gold-glow font-black uppercase tracking-[0.5em] mb-8 border-b border-gold/10 pb-4">Interpretación de la Esencia</h3>
                    <p id="txt-s" class="text-xl serif-italic leading-relaxed text-gray-200"></p>
                </div>
                <div class="glass p-10 result-box" id="box-c">
                    <h3 class="text-[8px] text-gray-500 font-black uppercase tracking-[0.5em] mb-8 border-b border-white/5 pb-4">Análisis de la Técnica</h3>
                    <p id="txt-c" class="text-xl serif-italic leading-relaxed text-gray-400"></p>
                </div>
            </div>
        </div>

        <div id="sec-mentor" class="hidden max-w-3xl mx-auto space-y-8">
            <div id="chat" class="glass h-[450px] p-12 overflow-y-auto space-y-10 font-light border-t-2 border-gold/10">
                <div class="serif-italic border-l border-gold/40 pl-8 py-2 text-gold/50 text-lg leading-relaxed italic">"El maestro aguarda en el taller..."</div>
            </div>
            <div class="flex gap-4 items-center">
                <input type="text" id="chat-in" class="flex-grow bg-white/[0.02] border border-white/5 rounded-2xl px-8 py-5 outline-none focus:border-gold/30 text-sm font-light transition-all" placeholder="Escribe al mentor...">
                <button onclick="run('mentor')" class="bg-[#D4AF37] text-black w-14 h-14 rounded-full font-black flex items-center justify-center active:scale-90 shadow-lg">
                    <div id="load-mentor" class="loader !border-black/20 !border-top-black"></div>
                    <span id="label-mentor">↑</span>
                </button>
            </div>
        </div>

        <div id="sec-vision" class="hidden grid lg:grid-cols-12 gap-12 items-start">
            <div class="lg:col-span-5 space-y-8">
                <h2 class="text-4xl serif-italic gold-glow leading-tight">Alquimia Visual</h2>
                <p class="text-gray-500 text-[9px] tracking-[0.4em] uppercase font-bold">Materialización de Autor.</p>
                <button onclick="run('vision')" class="w-full bg-white/[0.02] border border-gold/20 text-gold py-5 rounded-2xl font-black uppercase text-[10px] tracking-[0.4em] hover:bg-gold hover:text-black transition-all flex items-center justify-center gap-4">
                    Generar Prompt <div id="load-vision" class="loader"></div>
                </button>
            </div>
            <div class="lg:col-span-7">
                <div class="glass p-10 min-h-[400px] flex flex-col justify-between border-dashed border border-gold/10">
                    <div id="txt-v" class="text-lg text-gray-300 serif-italic leading-relaxed text-left opacity-80 pt-4">...</div>
                    <div id="copy-area" class="hidden pt-8 border-t border-white/5 flex justify-end">
                        <button onclick="copyV()" class="text-[8px] font-black gold-glow uppercase tracking-[0.4em] border border-gold/20 px-8 py-3 rounded-full hover:bg-gold/10 transition-all flex items-center gap-3">
                            Copiar Prompt <span id="copy-ok" class="hidden">✓</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let IMG = null;

        function config() {
            const k = prompt("API KEY:");
            if(k) localStorage.setItem('v9_key', k.trim());
        }

        function nav(id) {
            ['analisis', 'mentor', 'vision'].forEach(s => {
                document.getElementById(`sec-${s}`).classList.add('hidden');
                document.getElementById(`nav-${s}`).classList.remove('active');
            });
            const active = document.getElementById(`sec-${id}`);
            active.classList.remove('hidden');
            if(id !== 'mentor') active.classList.add('grid');
            document.getElementById(`nav-${id}`).classList.add('active');
        }

        document.getElementById('file').onchange = e => {
            const r = new FileReader();
            r.onload = ev => {
                document.getElementById('preview').src = ev.target.result;
                document.getElementById('preview').classList.remove('hidden');
                document.getElementById('idle').classList.add('hidden');
                IMG = ev.target.result.split(',')[1];
            };
            r.readAsDataURL(e.target.files[0]);
        };

        async function run(mode) {
            const k = localStorage.getItem('v9_key');
            if(!k) return alert("Falta API Key");
            
            const load = document.getElementById(`load-${mode}`);
            const line = document.getElementById('line');
            load.style.display = 'block';
            if(mode === 'analisis') line.style.display = 'block';

            let promptText = "";
            if(mode === 'analisis') promptText = "Analiza la imagen. Responde estrictamente un JSON con las claves 's' (interpretación mística/emocional) y 'c' (análisis técnico de trazo y fabricación).";
            else if(mode === 'mentor') {
                const q = document.getElementById('chat-in').value;
                promptText = `Mentor de diseño y carpintería digital: responde brevemente a: ${q}`;
                document.getElementById('chat').innerHTML += `<div class='text-right text-[8px] tracking-widest opacity-30 mb-2 mt-8 uppercase'>[Autor]: ${q}</div>`;
                document.getElementById('chat-in').value = "";
            } else promptText = "Genera un prompt de render artístico basado en este boceto. Imagina fabricación en madera de Lenga, luz cenital y detalle ultra-realista de taller de autor.";

            try {
                const list = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`);
                const dataM = await list.json();
                const model = dataM.models.find(m => m.name.includes("flash") && m.supportedGenerationMethods.includes("generateContent"))?.name;

                const payload = { contents: [{ parts: [{ text: promptText }] }] };
                if(IMG && mode !== 'mentor') payload.contents[0].parts.push({ inlineData: { mimeType: "image/jpeg", data: IMG } });

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${k}`, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                let raw = data.candidates[0].content.parts[0].text;

                if(mode === 'analisis') {
                    // Limpieza robusta de JSON
                    const start = raw.indexOf('{');
                    const end = raw.lastIndexOf('}') + 1;
                    const json = JSON.parse(raw.substring(start, end));
                    
                    document.getElementById('txt-s').innerText = json.s;
                    document.getElementById('txt-c').innerText = json.c;
                    document.getElementById('box-s').classList.add('visible');
                    document.getElementById('box-c').classList.add('visible');
                } else if(mode === 'mentor') {
                    document.getElementById('chat').innerHTML += `<div class='serif-italic border-l border-gold/30 pl-8 py-4 text-lg text-gold/80'>[Maestro]: ${raw}</div>`;
                    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                } else {
                    document.getElementById('txt-v').innerText = raw;
                    document.getElementById('copy-area').classList.remove('hidden');
                }
            } catch (e) { alert("Sincronización fallida. Verifica tu conexión o clave."); }
            finally { load.style.display = 'none'; line.style.display = 'none'; }
        }

        function copyV() {
            navigator.clipboard.writeText(document.getElementById('txt-v').innerText);
            document.getElementById('copy-ok').classList.remove('hidden');
            setTimeout(() => document.getElementById('copy-ok').classList.add('hidden'), 2000);
        }
    </script>
</body>
</html>
