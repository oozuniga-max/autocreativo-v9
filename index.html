<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCreativo V9 | Dualidad y Claridad</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #050505; color: #F2F2F2; font-family: 'Outfit', sans-serif; }
        .glass-card { background: #0D0D0F; border: 1px solid rgba(212, 175, 55, 0.25); }
        .scanning-line { position: absolute; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #D4AF37, transparent); animation: scan 3s infinite; display: none; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="antialiased min-h-screen">

    <nav class="fixed w-full z-50 bg-[#050505]/95 backdrop-blur border-b border-white/10">
        <div class="max-w-7xl mx-auto px-8 h-24 flex items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 border-2 border-[#D4AF37] flex items-center justify-center font-bold text-[#D4AF37] rotate-45">
                    <span class="-rotate-45">V9</span>
                </div>
                <span class="font-extrabold tracking-widest">AutoCreativo Dual</span>
            </div>
        </div>
    </nav>

    <main class="pt-44 pb-32 px-8 max-w-7xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-6xl font-bold">El Alma en el <span class="text-[#D4AF37] font-serif italic">Trazo</span></h1>
        </header>

        <div class="grid lg:grid-cols-12 gap-12">
            <div class="lg:col-span-5">
                <div class="glass-card rounded-3xl p-10">
                    <div id="drop-zone" class="aspect-square border-2 border-dashed border-white/40 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:border-[#D4AF37]">
                        <input type="file" id="file-upload" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                        <div id="drop-content" class="text-center">
                            <div class="text-5xl mb-4">📸</div>
                            <p class="font-mono text-[#D4AF37]">Sube tu imagen</p>
                        </div>
                        <img id="image-preview" class="hidden absolute inset-0 w-full h-full object-contain p-4">
                    </div>

                    <button onclick="startAnalysis()" id="btn-analyze" 
                            class="w-full mt-8 bg-[#D4AF37] text-black font-bold py-6 rounded-2xl">
                        EJECUTAR ANÁLISIS DUAL
                    </button>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div id="status" class="glass-card rounded-3xl p-8 min-h-[400px]"></div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = "AIzaSyD5BBfs8D6EWUtNC2Tx0rrlIGB5JhoDzyw";
        let currentBase64 = null;

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-upload');
        const preview = document.getElementById('image-preview');
        const dropContent = document.getElementById('drop-content');
        const status = document.getElementById('status');

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                preview.classList.remove('hidden');
                dropContent.classList.add('hidden');
                currentBase64 = e.target.result.split(',')[1];
                status.innerHTML = `<p class="text-green-400">✓ Imagen cargada correctamente</p>`;
            };
            reader.readAsDataURL(file);
        }

        async function startAnalysis() {
            if (!currentBase64) {
                alert("Primero sube una imagen");
                return;
            }

            status.innerHTML = `<p class="text-yellow-400">Conectando con Gemini...</p>`;
            document.getElementById('btn-analyze').disabled = true;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Describe este dibujo de forma creativa y detallada en español." },
                                { inlineData: { mimeType: "image/jpeg", data: currentBase64 } }
                            ]
                        }]
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    console.error(data);
                    throw new Error(JSON.stringify(data.error || data));
                }

                const text = data.candidates[0].content.parts[0].text;
                status.innerHTML = `<div class="prose prose-invert">${text.replace(/\n/g, '<br><br>')}</div>`;

            } catch (err) {
                console.error(err);
                status.innerHTML = `
                    <p class="text-red-400 font-bold">❌ Error de conexión</p>
                    <p class="text-sm mt-4 break-all">${err.message}</p>
                    <p class="text-xs mt-6 text-gray-400">Prueba creando una nueva clave API en Google AI Studio</p>
                `;
            } finally {
                document.getElementById('btn-analyze').disabled = false;
            }
        }
    </script>
</body>
</html>
