<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCreativo V9 | Dualidad y Claridad</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #050505; color: #F2F2F2; font-family: 'Outfit', sans-serif; }
        .glass-card { background: #0D0D0F; border: 1px solid rgba(212, 175, 55, 0.2); }
        .scanning-line { position: absolute; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #D4AF37, transparent); animation: scan 3s infinite; display: none; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .loader { border: 3px solid rgba(212,175,55,0.2); border-top-color: #D4AF37; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
    </style>
</head>
<body class="antialiased min-h-screen">

    <nav class="fixed w-full z-50 bg-[#050505]/95 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-7xl mx-auto px-8 h-24 flex items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 border-2 border-[#D4AF37] flex items-center justify-center font-bold text-[#D4AF37] rotate-45">
                    <span class="-rotate-45">V9</span>
                </div>
                <span class="font-extrabold tracking-[0.3em] text-sm uppercase">AutoCreativo <span class="text-[#D4AF37]">Dual</span></span>
            </div>
        </div>
    </nav>

    <main class="pt-44 pb-32 px-8 max-w-7xl mx-auto">
        <header class="text-center mb-20">
            <h1 class="text-6xl lg:text-8xl font-bold tracking-tighter">El Alma en el <span class="text-[#D4AF37] font-serif italic">Trazo</span></h1>
        </header>

        <div class="grid lg:grid-cols-12 gap-16">
            <div class="lg:col-span-5">
                <div class="glass-card rounded-3xl p-10">
                    <div id="drop-zone" class="aspect-square border-2 border-dashed border-white/30 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:border-[#D4AF37]">
                        <input type="file" id="file-upload" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                        <div id="drop-content" class="text-center">
                            <div class="text-6xl mb-6">✨</div>
                            <p class="font-mono text-[#D4AF37]">ARRASTRA O HAZ CLIC</p>
                        </div>
                        <img id="image-preview" class="hidden absolute inset-0 w-full h-full object-contain p-6">
                        <div id="scanner" class="scanning-line"></div>
                    </div>

                    <button onclick="startAnalysis()" id="btn-analyze" class="w-full mt-8 bg-[#D4AF37] text-black font-black py-6 rounded-2xl">
                        EJECUTAR ANÁLISIS DUAL
                    </button>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div id="results-empty" class="text-center py-32">
                    <p class="text-6xl mb-8">👁️</p>
                    <p>Sube tu imagen para comenzar</p>
                </div>
                <div id="results-dashboard" class="hidden">
                    <div id="analysis-result" class="glass-card rounded-3xl p-8 text-lg leading-relaxed"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = "AIzaSyD5BBfs8D6EWUtNC2Tx0rrlIGB5JhoDzyw";
        let currentBase64 = null;

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-upload');
        const preview = document.getElementById('image-preview');
        const dropContent = document.getElementById('drop-content');
        const scanner = document.getElementById('scanner');

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
        dropZone.addEventListener('drop', e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                preview.classList.remove('hidden');
                dropContent.classList.add('hidden');
                currentBase64 = e.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }

        async function startAnalysis() {
            if (!currentBase64) return alert("Sube una imagen primero");

            document.getElementById('btn-analyze').innerText = "CONECTANDO CON GEMINI...";
            scanner.style.display = 'block';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Describe este dibujo de forma creativa y detallada en español." },
                                { inlineData: { mimeType: "image/jpeg", data: currentBase64 }}
                            ]
                        }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    console.error(data);
                    throw new Error(data.error?.message || `Error ${response.status}`);
                }

                const text = data.candidates[0].content.parts[0].text;

                document.getElementById('results-empty').classList.add('hidden');
                document.getElementById('results-dashboard').classList.remove('hidden');
                document.getElementById('analysis-result').innerHTML = text.replace(/\n/g, '<br><br>');

            } catch (err) {
                console.error(err);
                let msg = err.message;
                if (msg.includes("API key")) msg = "Clave API inválida o no habilitada";
                if (msg.includes("quota")) msg = "Cuota excedida";
                alert("Error: " + msg);
            } finally {
                document.getElementById('btn-analyze').innerText = "EJECUTAR ANÁLISIS DUAL";
                scanner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
